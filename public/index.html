<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>PAUL</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap");

      :root {
        --ink: oklch(17% 0.005 95);
        --paper: oklch(93.6% 0.015 95);
        color: var(--ink);
        background: var(--paper);
        font-family: "Dela Gothic One", Impact, Haettenschweiler, "Arial Black", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        overflow: hidden;
        background: linear-gradient(174deg, var(--paper) 0 50%, var(--ink) 50% 100%);
      }

      h1 {
        margin: 0;
        padding: 0 0.1em;
        color: var(--paper);
        font-size: clamp(6rem, 26vw, 18rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.78;
        mix-blend-mode: difference;
        text-align: center;
        text-transform: uppercase;
      }

      h1::selection {
        color: var(--paper);
        background: var(--ink);
      }
    </style>
  </head>
  <body>
    <h1>PAUL</h1>
  </body>
</html>
