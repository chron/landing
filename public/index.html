<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>PAUL</title>
    <style>
      :root {
        color: #11110f;
        background: #efede4;
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(#11110f 0 0) 0 0 / 100% 12px no-repeat,
          linear-gradient(#11110f 0 0) 0 100% / 100% 12px no-repeat,
          #efede4;
      }

      h1 {
        margin: 0;
        padding: 0 0.1em;
        color: #11110f;
        font-size: 7rem;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.78;
        text-align: center;
        text-transform: uppercase;
      }

      h1::selection {
        color: #efede4;
        background: #11110f;
      }

      @media (min-width: 40rem) {
        h1 {
          font-size: 14rem;
        }
      }

      @media (min-width: 64rem) {
        h1 {
          font-size: 22rem;
        }
      }
    </style>
  </head>
  <body>
    <h1>PAUL</h1>
  </body>
</html>
